<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Instructor Grindset • YouTube Channel</title>
  <meta name="description" content="Latest videos and curated playlists from Instructor Grindset." />
  <link rel="canonical" href="https://instructorgrindset.com/youtube-channel" />

  <!-- Social -->
  <meta property="og:title" content="Instructor Grindset — YouTube Channel">
  <meta property="og:description" content="Latest videos and curated playlists from Instructor Grindset.">
  <meta property="og:url" content="https://instructorgrindset.com/youtube-channel">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://instructorgrindset.com/images/og-cover.jpg">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/global.css?v=1">
  <!-- Shared sidebar styles (cache-busted) -->
  <link rel="stylesheet" href="/assets/sidebar.css?v=5">

  <style>
:root{
      --content-shift:0px; --grid-gap:14px; --thumb-radius:.75rem;
    }
    .main{padding:1.25rem}
    .content{
      width:min(1100px, calc(100vw - var(--sidebar) - 40px));
      margin-left:max(14px, calc((100vw - var(--sidebar) - min(1100px, calc(100vw - var(--sidebar) - 40px)))/2 - var(--content-shift)));
      margin-right:auto; padding-top:2.2rem;
    }
    @media (max-width:960px){ .content{ width:min(94vw, 1100px); margin:0 auto; padding-top:1.25rem } }
    .muted{color:var(--muted)}

    /* Video chrome */
    .vid{
      position:relative; width:100%; aspect-ratio:16/9; border-radius:var(--thumb-radius); overflow:hidden; background:#000;
      box-shadow:0 0 18px rgba(var(--glow),.24), 0 0 48px rgba(var(--glow),.12);
    }
    .vid.featured{max-width:800px; margin:0 auto}
    iframe{width:100%;height:100%;border:0;display:block}

    /* Grids */
    .grid{display:grid; gap:var(--grid-gap)}
    .three{grid-template-columns:repeat(2,minmax(0,1fr))}
    @media (min-width:1200px){ .three{grid-template-columns:repeat(3,minmax(0,1fr))} }
    @media (max-width:640px){ .three{grid-template-columns:1fr} }

    /* Page header — centered vertical stack */
    .yt-header{text-align:center; margin-bottom:1.5rem}
    .yt-header h1{margin-bottom:.75rem}

    .section-eyebrow{font-size:var(--text-sm);text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600;margin-bottom:.35rem;text-align:center}
  </style>
</head>
<body>
  <!-- Skip to content -->
  <a class="skip-link" href="#main">Skip to main content</a>

  <div class="page">
    <!-- Sidebar (cache-busted fetch) -->
    <aside id="sidebar-placeholder" class="side" aria-busy="true"></aside>
    <script>
      (function(){
        const target = document.getElementById('sidebar-placeholder');
        fetch('/partials/sidebar.html?v=12')
          .then(r => r.text())
          .then(html => {
            const tmp = document.createElement('div');
            tmp.innerHTML = html.trim();
            target.replaceWith(tmp.firstElementChild);
          })
          .catch(() => {
            target.removeAttribute('aria-busy');
            target.innerHTML = '<div style="padding:1rem;color:#fca5a5">Navigation failed to load.</div>';
          });
      })();
    </script>

    <!-- Main -->
    <main class="main" id="main">
      <div class="content">
        <header class="yt-header">
          <h1>YouTube Channel</h1>
          <a class="btn btn-lg" href="https://www.youtube.com/@InstructorGrindset?sub_confirmation=1" target="_blank" rel="noopener">Subscribe on YouTube</a>
        </header>

        <!-- Latest Upload -->
        <section aria-labelledby="latest-title" style="margin-bottom:1.75rem">
          <h2 id="latest-title" style="text-align:center;margin-bottom:.75rem">Latest Upload</h2>
          <div id="latest" class="vid featured" aria-live="polite">
            <!-- JS will inject the latest video iframe here -->
          </div>
        </section>

        <!-- Playlist grid -->
        <section style="margin-top:1.25rem" aria-labelledby="pl-title">
          <h2 id="pl-title" style="text-align:center;margin-bottom:.75rem">Top Videos</h2>
          <div id="grid" class="grid three">
            <!-- JS will inject 9 playlist video iframes here -->
          </div>
        </section>
        <div class="btn-row" style="display:grid;place-items:center;margin-top:2rem;margin-bottom:1rem">
          <a class="btn btn-lg" href="/blog">Read the Blog &rarr;</a>
        </div>
      </div>
    </main>
  </div>

  <div class="footer-wrap"><p class="footer">© Instructor Grindset</p></div>

  <!-- YouTube loader (hardcoded channelId; one fewer API call) -->
  <script>
   /* ====== REQUIRED: replace with your real channel ID (UC… format) ====== */
const CHANNEL_ID = 'UCIa3wQYBROQwsR0bMJInDfw';

    /* ====== API KEY (restrict by HTTP referrer + YouTube Data API v3) ====== */
    const API_KEY = 'AIzaSyCTvr8-TNJoj9yzKKFoECvorSkc_5E8BlY';

    /* ====== PLAYLIST (for the 3×3 grid) ====== */
    const PLAYLIST_ID = 'PLMW_Kay-5LUXG2s1an3tiN5Lcc8KFXcKv';

    const YT = 'https://www.googleapis.com/youtube/v3';

    async function yt(endpoint, params){
      const url = new URL(YT + endpoint);
      Object.entries({...params, key: API_KEY}).forEach(([k,v]) => url.searchParams.set(k,v));
      const res = await fetch(url.toString());
      if(!res.ok) throw new Error('YouTube API error: ' + res.status);
      return res.json();
    }

    async function fetchLatestVideoId(channelId){
      const data = await yt('/search', {
        part: 'id',
        channelId,
        order: 'date',
        maxResults: 1,
        type: 'video'
      });
      const item = data.items?.[0];
      if(!item) throw new Error('No uploads found');
      return item.id.videoId;
    }

    async function fetchPlaylistVideoIds(playlistId, limit = 9){
      const data = await yt('/playlistItems', {
        part: 'contentDetails',
        playlistId,
        maxResults: limit
      });
      return (data.items || []).map(it => it.contentDetails.videoId).filter(Boolean);
    }

    function iframeHTML(videoId, title = 'YouTube video'){
      const src = `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1&playsinline=1`;
      return `<iframe src="${src}" title="${title}" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen></iframe>`;
    }

    async function render(){
      try{
        // Latest upload
        const latestId = await fetchLatestVideoId(CHANNEL_ID);
        document.getElementById('latest').innerHTML = iframeHTML(latestId, 'Latest Upload');

        // 3×3 grid from playlist
        const ids = await fetchPlaylistVideoIds(PLAYLIST_ID, 9);
        document.getElementById('grid').innerHTML = ids.map(id => `<div class="vid">${iframeHTML(id)}</div>`).join('');
      }catch(err){
        console.error(err);
        const latest = document.getElementById('latest');
        if(latest) latest.innerHTML = `<div style="padding:1rem;color:#fca5a5">Couldn’t load videos. Check API key, channelId, and quota.</div>`;
      }
    }

    render();
  </script>
</body>
</html>
