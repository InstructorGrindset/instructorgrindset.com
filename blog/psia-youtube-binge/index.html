<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The PSIA YouTube Binge — Instructor Grindset</title>
  <meta name="description" content="I went deep on PSIA's video library so you don't have to. Here's what's actually worth your time." />
  <link rel="canonical" href="https://instructorgrindset.com/blog/psia-youtube-binge/" />
  <link rel="stylesheet" href="/assets/sidebar.css?v=2">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --ink:#e7e9ee; --muted:#cbd5e1; --line:#2a3140; --accent:#a6c8ff;
      --cta:#c4892a; --glow:250,204,21; --sidebar:0px; --panel-bg:rgba(255,255,255,.03);
      --footer-h:52px;
      --content-shift:0px;
      --maxw: min(760px, calc(100vw - var(--sidebar) - 40px));
    }

    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0; color:var(--ink);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      line-height:1.55;
      background:#0f1217 url("/images/web-background.png") center/cover no-repeat fixed;
    }
    body::before{
      content:""; position:fixed; inset:0; pointer-events:none;
      background:radial-gradient(70% 60% at 50% 35%, rgba(0,0,0,.15), rgba(0,0,0,.35) 60%, rgba(0,0,0,.55));
      z-index:-1;
    }
    @font-face{font-family:"Rooftop";src:url("/fonts/Rooftop-Bold.woff2") format("woff2");font-weight:700;font-display:swap}
    @font-face{font-family:"Rooftop";src:url("/fonts/Rooftop-ExtraBold.woff2") format("woff2");font-weight:800;font-display:swap}

    a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}

    .page{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh;padding-bottom:var(--footer-h)}
    @media (max-width:960px){.page{grid-template-columns:1fr}}
    .side{padding:1.25rem;border-right:1px solid var(--line);background:rgba(255,255,255,.02)}

    .main{padding:1.25rem}
    .content{
      width:var(--maxw);
      margin-left:max(14px, calc((100vw - var(--sidebar) - var(--maxw))/2 - var(--content-shift)));
      margin-right:auto; padding-top:2rem;
    }
    @media (max-width:960px){.content{width:min(94vw,48rem);margin:0 auto;padding-top:1.75rem}}

    .back-link{display:inline-block;margin-bottom:1.5rem;font-size:.9rem;color:var(--muted)}
    .back-link:hover{color:var(--ink)}

    .post-meta{color:#8891a0;font-size:.85rem;margin:0 0 .75rem}

    h1{
      font-family:"Rooftop",Inter,Arial,sans-serif;font-weight:800;
      font-size:clamp(2rem,5vw,2.8rem);line-height:1.08;margin:0 0 1.5rem;
      background:linear-gradient(92deg,#fff,#eaeefc);-webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 0 22px rgba(var(--glow),.12);
    }

    .prose{color:var(--ink);font-size:clamp(.97rem,1vw + .1rem,1.1rem);line-height:1.75;max-width:65ch}
    .prose p{margin:0 0 1.25rem}
    .prose h2{
      font-family:"Rooftop",Inter,Arial,sans-serif;font-weight:800;font-size:1.35rem;
      margin:2rem 0 .75rem;color:#fff;
    }
    .prose ul,.prose ol{margin:0 0 1.25rem;padding-left:1.5rem}
    .prose li{margin:.35rem 0}
    .prose blockquote{
      margin:1.5rem 0;padding:.75rem 1rem;
      border-left:3px solid var(--cta);
      background:rgba(196,137,42,.06);
      color:var(--muted);font-style:italic;
    }

    .post-nav{
      display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem;
      margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--line);
      font-size:.9rem;
    }
    .post-nav a{color:var(--muted)}
    .post-nav a:hover{color:var(--ink)}

    .footer-wrap{position:fixed;left:var(--sidebar);right:0;bottom:0;height:var(--footer-h);
      display:grid;place-items:center;background:rgba(0,0,0,.25);border-top:1px solid var(--line);backdrop-filter:blur(2px)}
    .footer{color:var(--muted);text-align:center;margin:0}
    @media (max-width:960px){.footer-wrap{position:static;height:auto;padding:.75rem 0}}
  </style>
</head>
<body>
  <div class="page">
    <aside id="sidebar-placeholder" class="side" aria-busy="true"></aside>
    <script>
      (function(){
        const target = document.getElementById('sidebar-placeholder');
        fetch('/partials/sidebar.html?v=2')
          .then(r => r.text())
          .then(html => {
            const tmp = document.createElement('div');
            tmp.innerHTML = html.trim();
            target.replaceWith(tmp.firstElementChild);
          })
          .catch(() => {
            target.removeAttribute('aria-busy');
            target.innerHTML = '<div style="padding:1rem;color:#fca5a5">Navigation failed to load.</div>';
          });
      })();
    </script>

    <main class="main">
      <div class="content">
        <a class="back-link" href="/blog/">← All Posts</a>

        <p class="post-meta">November 2024</p>
        <h1>The PSIA YouTube Binge</h1>

        <div class="prose">
          <!-- PASTE POST CONTENT HERE -->
          <p>Post content coming soon.</p>
        </div>

        <nav class="post-nav" aria-label="Post navigation">
          <a href="/blog/settle-down-non-believers/">← Settle Down, Non-Believers</a>
          <span></span>
        </nav>
      </div>
    </main>
  </div>

  <div class="footer-wrap"><p class="footer">© Instructor Grindset</p></div>
</body>
</html>
