<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instructor Grindset • Instagram</title>
  <meta name="description" content="Follow @ohgoody on Instagram for reels and coaching ideas." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/global.css?v=1">
  <link rel="stylesheet" href="/assets/sidebar.css?v=5">

  <style>
:root{

      /* Layout knobs */
      --content-shift:0px;
      --grid-gap:14px;
      --thumb-radius:.75rem;
      --maxw: min(1100px, calc(100vw - var(--sidebar) - 40px));
    }
    body{
      margin:0; color:var(--ink);
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; line-height:1.55;
      background:#0f1217 url("/images/web-background.png") center/cover no-repeat fixed;
    }

    /* Shell */
    .brand:hover{filter:brightness(1.04)}
    .brand .logo-wrap img{width:120%;height:120%;object-fit:cover}
    .content{
      width:var(--maxw);
      margin-left:max(14px, calc((100vw - var(--sidebar) - var(--maxw))/2 - var(--content-shift)));
      margin-right:auto; padding-top:2rem;
    }
    @media (max-width:960px){ .content{width:min(94vw,1100px); margin:0 auto; padding-top:1.25rem} }

    h1,h2{font-family:"Rooftop",Inter,Arial,sans-serif;letter-spacing:.2px}
    h1{
      font-weight:800;font-size:clamp(2.2rem,5vw,3.2rem);line-height:1.08;margin:0 0 .9rem;
      background:linear-gradient(92deg,#fff,#eaeefc);-webkit-background-clip:text;background-clip:text;color:transparent;
      text-shadow:0 0 22px rgba(var(--glow),.12);
    }

    .row{display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin:.6rem 0 1.25rem}
    .cta{display:inline-block;padding:.8rem 1rem;border-radius:0;background:var(--cta);color:#e6e7eb;font-weight:800;border:0;white-space:nowrap}

    /* Embeds with glow (no boxes) */
    .gram{
      position:relative;border-radius:var(--thumb-radius);overflow:hidden;background:#000;
      box-shadow:0 0 18px rgba(var(--glow),.24), 0 0 48px rgba(var(--glow),.12);
    }
    /* Let Instagram control inner sizing; we just give breathing room */
    .gram .inner{padding:6px}

    .grid{display:grid; gap:var(--grid-gap)}
    .three{grid-template-columns:repeat(3,minmax(0,1fr))}
    @media (max-width:980px){ .three{grid-template-columns:repeat(2,minmax(0,1fr))} }
    @media (max-width:640px){ .three{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="page">
    <!-- Sidebar -->
    <!-- placeholder gets replaced at runtime -->
<aside id="sidebar-placeholder" class="side" aria-busy="true"></aside>
<script>
  (function(){
    const target = document.getElementById('sidebar-placeholder');
    fetch('/partials/sidebar.html?v=13')  // bump ?v= number when you edit the partial to bust cache
      .then(r => r.text())
      .then(html => {
        const tmp = document.createElement('div');
        tmp.innerHTML = html.trim();
        target.replaceWith(tmp.firstElementChild);
      })
      .catch(() => {
        target.removeAttribute('aria-busy');
        target.innerHTML = '<div style="padding:1rem;color:#fca5a5">Navigation failed to load.</div>';
      });
  })();
</script>


    <!-- Main -->
    <main class="main">
      <div class="content">
        <header class="row">
          <h1 style="margin:0">Instagram</h1>
          <a class="cta" href="https://www.instagram.com/ohgoody/" target="_blank" rel="noopener">Follow @ohgoody</a>
        </header>

     <!-- Grid of 9 posts (glow, no boxes) -->
<section aria-labelledby="grid-title">
  <h2 id="grid-title" style="margin:.25rem 0 .6rem">Latest from @ohgoody</h2>
  <div class="grid three">
    <!-- These three were already working -->
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DTMDRijkqAM/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DTZMVvlgRnf/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DTxr7eSAfY9/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DTzGYl0gFzD/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DURHfcfj_RS/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DU0oIvGgGLm/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DVuMk2zAe54/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DV5CXnegSSw/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
    <div class="gram"><div class="inner"><blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/p/DWpi-IdGE7V/" data-instgrm-version="14" style="margin:0 auto; background:#fff; border:0; max-width:540px; width:100%;"></blockquote></div></div>
  </div>
</section>
      </div>
    </main>
  </div>

  <!-- Footer -->
  <div class="footer-wrap"><p class="footer">© Instructor Grindset</p></div>

  <!-- Instagram embed script (loads once; renders all blockquotes) -->
  <script async src="//www.instagram.com/embed.js"></script>
</body>
</html>
